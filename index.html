<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>おんぷクイズ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fdf6e3;
      font-family: 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-tap-highlight-color: transparent;
    }

    h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: #5a3e1b;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: clamp(0.8rem, 3vw, 1rem);
      color: #9a7a4a;
      margin-bottom: 24px;
    }

    .staff-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(90,62,27,0.15);
      padding: 40px 30px;
      width: 100%;
      max-width: 600px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.1s, box-shadow 0.1s;
      touch-action: manipulation;
    }

    .staff-container:active {
      transform: scale(0.98);
      box-shadow: 0 4px 16px rgba(90,62,27,0.15);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }


    /* Note animation */
    .note-group {
      transition: opacity 0.2s;
    }

    .note-enter {
      animation: popIn 0.3s ease-out forwards;
    }

    @keyframes popIn {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .tap-hint {
      margin-top: 20px;
      font-size: clamp(0.85rem, 3.5vw, 1.05rem);
      color: #b08050;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tap-icon {
      font-size: 1.4em;
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    .counter {
      margin-top: 12px;
      font-size: clamp(0.75rem, 2.5vw, 0.9rem);
      color: #c0a070;
    }

  </style>
</head>
<body>

<h1>🎵 おんぷクイズ</h1>
<p class="subtitle">この音符は何の音？</p>

<div class="staff-container" id="staffCard" onclick="showNewNotes()">
  <svg id="staffSvg" viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg">

    <!-- ======= 5 staff lines ======= -->
    <!-- line1=E4, line2=G4, line3=B4, line4=D5, line5=F5 -->
    <!-- We'll define: line1 y=160, line2 y=140, line3 y=120, line4 y=100, line5 y=80 -->
    <!-- space between lines = 20px -->
    <g id="staffLines" stroke="#444" stroke-width="1.5">
      <line x1="80" y1="80"  x2="540" y2="80" />   <!-- line5: F5 -->
      <line x1="80" y1="100" x2="540" y2="100" />  <!-- line4: D5 -->
      <line x1="80" y1="120" x2="540" y2="120" />  <!-- line3: B4 -->
      <line x1="80" y1="140" x2="540" y2="140" />  <!-- line2: G4 -->
      <line x1="80" y1="160" x2="540" y2="160" />  <!-- line1: E4 -->
    </g>

    <!-- ======= Treble Clef (drawn with path) ======= -->
    <!-- Simple treble clef SVG path centered at x=95, staff center ~120 -->
    <text id="trebleClef" x="82" y="170" font-size="140" font-family="serif" fill="#333"
          style="font-weight:100; line-height:1">𝄞</text>

    <!-- ======= Notes will be injected here ======= -->
    <g id="notesLayer"></g>

  </svg>
</div>

<p class="tap-hint"><span class="tap-icon">👆</span> タップで次の問題へ</p>
<p class="counter" id="counter">第 1 問</p>

<script>
  // -------------------------------------------------------
  // Note definitions for treble clef
  // staffY: y coordinate on the SVG staff
  //   line1(E4)=160, space below line1(D4)=170, ledger(C4)=180
  //   line2(G4)=140, space(F4)=150
  //   line3(B4)=120, space(A4)=130
  //   line4(D5)=100, space(C5)=110
  //   line5(F5)=80,  space(E5)=90
  // -------------------------------------------------------
  const NOTES = [
    { name: 'ド',  nameEn: 'C4', staffY: 180, needsLedger: true  },
    { name: 'レ',  nameEn: 'D4', staffY: 170, needsLedger: false },
    { name: 'ミ',  nameEn: 'E4', staffY: 160, needsLedger: false },
    { name: 'ファ',nameEn: 'F4', staffY: 150, needsLedger: false },
    { name: 'ソ',  nameEn: 'G4', staffY: 140, needsLedger: false },
  ];

  // X positions for the 3 notes (spread across the staff)
  const NOTE_X = [200, 340, 470];

  // Note oval size
  const RX = 13, RY = 10;

  let count = 1;

  function adjustTrebleClefPosition() {
    const clef = document.getElementById('trebleClef');
    if (!clef) return;
    const isMobile = window.matchMedia('(max-width: 640px)').matches;
    const isTablet = window.matchMedia('(max-width: 1024px)').matches;

    if (isMobile) {
      clef.setAttribute('font-size', '146');
      clef.setAttribute('y', '171');
      return;
    }

    if (isTablet) {
      clef.setAttribute('font-size', '144');
      clef.setAttribute('y', '170');
      return;
    }

    clef.setAttribute('font-size', '140');
    clef.setAttribute('y', '170');
  }

  function pickRandomNotes(n) {
    // Pick n distinct notes from NOTES
    const shuffled = [...NOTES].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, n);
  }

  function renderNotes(notes) {
    const layer = document.getElementById('notesLayer');
    layer.innerHTML = '';

    notes.forEach((note, i) => {
      const x = NOTE_X[i];
      const y = note.staffY;

      // Group for animation
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'note-enter');
      // Animate each note with a slight delay
      g.style.animationDelay = `${i * 80}ms`;
      g.setAttribute('transform-origin', `${x} ${y}`);

      // Ledger line for C4 (ド)
      if (note.needsLedger) {
        const ledger = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        ledger.setAttribute('x1', x - RX - 5);
        ledger.setAttribute('y1', y);
        ledger.setAttribute('x2', x + RX + 5);
        ledger.setAttribute('y2', y);
        ledger.setAttribute('stroke', '#222');
        ledger.setAttribute('stroke-width', '1.5');
        g.appendChild(ledger);
      }

      // Note oval (filled, slightly rotated)
      const ellipse = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
      ellipse.setAttribute('cx', x);
      ellipse.setAttribute('cy', y);
      ellipse.setAttribute('rx', RX);
      ellipse.setAttribute('ry', RY);
      ellipse.setAttribute('fill', '#222');
      ellipse.setAttribute('transform', `rotate(-15, ${x}, ${y})`);
      g.appendChild(ellipse);

      // Stem (upward for low notes)
      const stem = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      stem.setAttribute('x1', x + RX - 1);
      stem.setAttribute('y1', y);
      stem.setAttribute('x2', x + RX - 1);
      stem.setAttribute('y2', y - 55);
      stem.setAttribute('stroke', '#222');
      stem.setAttribute('stroke-width', '2');
      g.appendChild(stem);

      layer.appendChild(g);
    });
  }

  function showNewNotes() {
    count++;
    document.getElementById('counter').textContent = `第 ${count} 問`;
    const notes = pickRandomNotes(3);
    renderNotes(notes);
  }

  // Initial display
  adjustTrebleClefPosition();
  renderNotes(pickRandomNotes(3));
  window.addEventListener('resize', adjustTrebleClefPosition);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>おんぷクイズ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fdf6e3;
      font-family: 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-tap-highlight-color: transparent;
    }

    h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: #5a3e1b;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: clamp(0.8rem, 3vw, 1rem);
      color: #9a7a4a;
      margin-bottom: 16px;
    }

    .level-selector {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .level-label {
      font-size: clamp(0.75rem, 2.5vw, 0.85rem);
      color: #9a7a4a;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .level-buttons {
      display: flex;
      gap: 8px;
    }

    .level-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #d4a870;
      background: white;
      color: #8a6030;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .level-btn:hover {
      background: #f5e8d0;
    }

    .level-btn.active {
      background: #c87a30;
      border-color: #c87a30;
      color: white;
      box-shadow: 0 2px 8px rgba(200,122,48,0.4);
    }

    .clef-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .clef-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 2px solid #d4a870;
      background: white;
      color: #8a6030;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .clef-btn:hover {
      background: #f5e8d0;
    }

    .clef-btn.active {
      background: #c87a30;
      border-color: #c87a30;
      color: white;
      box-shadow: 0 2px 8px rgba(200,122,48,0.4);
    }

    .level-desc {
      font-size: clamp(0.7rem, 2.5vw, 0.82rem);
      color: #b08050;
    }

    .staff-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(90,62,27,0.15);
      padding: 30px 24px;
      width: 100%;
      max-width: 600px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.1s, box-shadow 0.1s;
      touch-action: manipulation;
    }

    .staff-container:active {
      transform: scale(0.98);
      box-shadow: 0 4px 16px rgba(90,62,27,0.15);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }


    /* Note animation */
    .note-group {
      transition: opacity 0.2s;
    }

    .note-enter {
      animation: popIn 0.3s ease-out forwards;
    }

    @keyframes popIn {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .tap-hint {
      margin-top: 20px;
      font-size: clamp(0.85rem, 3.5vw, 1.05rem);
      color: #b08050;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tap-icon {
      font-size: 1.4em;
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    .counter {
      margin-top: 12px;
      font-size: clamp(0.75rem, 2.5vw, 0.9rem);
      color: #c0a070;
    }

    .app-header {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== Landscape on phones/tablets ===== */
    @media (orientation: landscape) and (max-height: 520px) {
      body {
        flex-direction: row;
        align-items: center;
        justify-content: center;
        padding: 10px 16px;
        gap: 16px;
        min-height: 100vh;
      }

      .app-header {
        width: 150px;
        flex-shrink: 0;
        max-width: none;
      }

      h1 { font-size: 1rem; margin-bottom: 3px; }
      .subtitle { font-size: 0.72rem; margin-bottom: 6px; }
      .clef-selector { gap: 4px; margin-bottom: 6px; }
      .clef-btn { padding: 4px 8px; font-size: 0.7rem; }
      .level-selector { gap: 4px; margin-bottom: 6px; }
      .level-buttons { gap: 5px; flex-wrap: wrap; width: 94px; }
      .level-btn { width: 28px; height: 28px; font-size: 0.76rem; }
      .level-desc { font-size: 0.64rem; }
      .tap-hint { margin-top: 8px; font-size: 0.78rem; gap: 5px; }
      .tap-icon { font-size: 1.1em; }
      .counter { margin-top: 4px; font-size: 0.7rem; }

      .staff-container {
        flex: 1;
        min-width: 0;
        max-width: none;
        padding: 12px 16px;
      }
    }

  </style>
</head>
<body>

<div class="app-header">
  <h1>🎵 おんぷクイズ</h1>
  <p class="subtitle">この音符は何の音？</p>

  <div class="clef-selector">
    <button class="clef-btn active" onclick="selectClef('treble')">ト音記号</button>
    <button class="clef-btn" onclick="selectClef('bass')">ヘ音記号</button>
  </div>

  <div class="level-selector">
    <span class="level-label">レベル</span>
    <div class="level-buttons">
      <button class="level-btn active" onclick="selectLevel(0)">1</button>
      <button class="level-btn" onclick="selectLevel(1)">2</button>
      <button class="level-btn" onclick="selectLevel(2)">3</button>
      <button class="level-btn" onclick="selectLevel(3)">4</button>
      <button class="level-btn" onclick="selectLevel(4)">5</button>
      <button class="level-btn" onclick="selectLevel(5)">6</button>
    </div>
    <span class="level-desc" id="levelDesc">ド・レ・ミ</span>
  </div>

  <p class="tap-hint"><span class="tap-icon">👆</span> タップで次の問題へ</p>
  <p class="counter" id="counter">第 1 問</p>
</div>

<div class="staff-container" id="staffCard" onclick="showNewNotes()">

    <!-- line spacing=24px: line5 y=74, line4 y=98, line3 y=122, line2 y=146, line1 y=170 -->
    <g id="staffLines" stroke="#444" stroke-width="1.5">
      <line x1="70" y1="59"  x2="445" y2="59"  />  <!-- line5: F5 -->
      <line x1="70" y1="83"  x2="445" y2="83"  />  <!-- line4: D5 -->
      <line x1="70" y1="107" x2="445" y2="107" />  <!-- line3: B4 -->
      <line x1="70" y1="131" x2="445" y2="131" />  <!-- line2: G4 -->
      <line x1="70" y1="155" x2="445" y2="155" />  <!-- line1: E4 -->
    </g>

    <!-- ======= Treble Clef (SVG path, G-curl aligned to G4 line at y=146) ======= -->

    <!-- ======= Bass Clef (SVG path, dots flanking F3 line y=83) ======= -->

    <!-- Upper dot offset=3.14 units×4.1=12.87px → translate_y=71-12.87=58.13 -->
    <!-- Combined: translate(70,58.13)·scale(4.1)·translate(-230.9546,-533.6597) -->

      <path fill="#333" d="M 248.25999,542.64502 C 248.26772,543.01469 248.11076,543.38446 247.82878,543.62585 C 247.46853,543.95476 246.91933,544.02213 246.47048,543.85472 C 246.02537,543.68288 245.69655,543.24237 245.67145,542.76389 C 245.63651,542.38990 245.76354,542.00308 246.02700,541.73300 C 246.27663,541.45454 246.66060,541.32790 247.02845,541.34950 C 247.51230,541.36282 247.95159,541.69251 248.15162,542.12465 C 248.22565,542.28740 248.26043,542.46657 248.25999,542.64502 z "/>

    </g>

    <!-- ======= Notes will be injected here ======= -->
    <g id="notesLayer"></g>

  </svg>
</div>

<script>
  // -------------------------------------------------------
  // Treble clef note definitions (staffY: SVG y coord, line spacing=24px)
  //   line1 E4=155, space F4=143, line2 G4=131, space A4=119
  //   line3 B4=107, space C5=95, line4 D5=83
  //   ledger C4=179, space D4=167
  // -------------------------------------------------------
  const TREBLE_NOTES = {
    C4: { name: 'ド',  staffY: 179, needsLedger: true  },
    D4: { name: 'レ',  staffY: 167, needsLedger: false },
    E4: { name: 'ミ',  staffY: 155, needsLedger: false },
    F4: { name: 'ファ', staffY: 143, needsLedger: false },
    G4: { name: 'ソ',  staffY: 131, needsLedger: false },
    A4: { name: 'ラ',  staffY: 119, needsLedger: false },
    B4: { name: 'シ',  staffY: 107, needsLedger: false },
    C5: { name: 'ド',  staffY:  95, needsLedger: false },
  };

  // -------------------------------------------------------
  // Bass clef note definitions (same staff lines, different note names)
  //   line1 G2=155, space A2=143, line2 B2=131, space C3=119
  //   line3 D3=107, space E3=95, line4 F3=83, space G3=71
  //   line5 A3=59, space B3=47, ledger C4=35
  // -------------------------------------------------------
  const BASS_NOTES = {
    C3: { name: 'ド',   staffY: 119, needsLedger: false },
    D3: { name: 'レ',   staffY: 107, needsLedger: false },
    E3: { name: 'ミ',   staffY:  95, needsLedger: false },
    F3: { name: 'ファ',  staffY:  83, needsLedger: false },
    G3: { name: 'ソ',   staffY:  71, needsLedger: false },
    A3: { name: 'ラ',   staffY:  59, needsLedger: false },
    B3: { name: 'シ',   staffY:  47, needsLedger: false },
    C4: { name: 'ド',   staffY:  35, needsLedger: true  },
  };

  const TREBLE_LEVELS = [
    { keys: ['C4','D4','E4'],                          desc: 'ド・レ・ミ' },
    { keys: ['C4','D4','E4','F4','G4'],                desc: 'ド・レ・ミ・ファ・ソ' },
    { keys: ['F4','G4','A4'],                          desc: 'ファ・ソ・ラ' },
    { keys: ['A4','B4','C5'],                          desc: 'ラ・シ・ド' },
    { keys: ['F4','G4','A4','B4','C5'],                desc: 'ファ・ソ・ラ・シ・ド' },
    { keys: ['C4','D4','E4','F4','G4','A4','B4','C5'], desc: 'ド〜ド' },
  ];

  const BASS_LEVELS = [
    { keys: ['C4','B3','A3'],                          desc: 'ド・シ・ラ' },
    { keys: ['C4','B3','A3','G3','F3'],                desc: 'ド・シ・ラ・ソ・ファ' },
    { keys: ['C3','D3','E3'],                          desc: 'ド・レ・ミ' },
    { keys: ['C3','D3','E3','F3','G3'],                desc: 'ド・レ・ミ・ファ・ソ' },
    { keys: ['C3','D3','E3','F3','G3','A3','B3','C4'], desc: 'ド〜ド' },
  ];

  // X positions for the 3 notes
  const NOTE_X = [190, 265, 340];

  // Note oval size
  const RX = 16, RY = 13;

  let count = 1;
  let currentLevel = 0;
  let currentClef = 'treble';

  function pickRandomNotes(n) {
    const notes = currentClef === 'treble' ? TREBLE_NOTES : BASS_NOTES;
    const levels = currentClef === 'treble' ? TREBLE_LEVELS : BASS_LEVELS;
    const pool = levels[currentLevel].keys.map(k => notes[k]);
    return Array.from({ length: n }, () => pool[Math.floor(Math.random() * pool.length)]);
  }

  function selectClef(clef) {
    currentClef = clef;
    document.querySelectorAll('.clef-btn').forEach((btn, i) => {
      btn.classList.toggle('active', (i === 0) === (clef === 'treble'));
    });
    document.getElementById('trebleClef').setAttribute('display', clef === 'treble' ? '' : 'none');
    document.getElementById('bassClef').setAttribute('display', clef === 'bass' ? '' : 'none');
    // ヘ音記号は5レベル、ト音記号は6レベル
    const levelBtns = document.querySelectorAll('.level-btn');
    levelBtns[5].style.display = clef === 'bass' ? 'none' : '';
    selectLevel(0);
  }

  function selectLevel(idx) {
    currentLevel = idx;
    document.querySelectorAll('.level-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === idx);
    });
    const levels = currentClef === 'treble' ? TREBLE_LEVELS : BASS_LEVELS;
    document.getElementById('levelDesc').textContent = levels[idx].desc;
    count = 1;
    document.getElementById('counter').textContent = '第 1 問';
    renderNotes(pickRandomNotes(3));
  }

  function renderNotes(notes) {
    const layer = document.getElementById('notesLayer');
    layer.innerHTML = '';

    notes.forEach((note, i) => {
      const x = NOTE_X[i];
      const y = note.staffY;

      // Group for animation
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'note-enter');
      // Animate each note with a slight delay
      g.style.animationDelay = `${i * 80}ms`;
      g.setAttribute('transform-origin', `${x} ${y}`);

      // Ledger line for C4 (ド)
      if (note.needsLedger) {
        const ledger = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        ledger.setAttribute('x1', x - RX - 5);
        ledger.setAttribute('y1', y);
        ledger.setAttribute('x2', x + RX + 5);
        ledger.setAttribute('y2', y);
        ledger.setAttribute('stroke', '#222');
        ledger.setAttribute('stroke-width', '1.5');
        g.appendChild(ledger);
      }

      // Note oval (filled, slightly rotated)
      const ellipse = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
      ellipse.setAttribute('cx', x);
      ellipse.setAttribute('cy', y);
      ellipse.setAttribute('rx', RX);
      ellipse.setAttribute('ry', RY);
      ellipse.setAttribute('fill', '#222');
      ellipse.setAttribute('transform', `rotate(-15, ${x}, ${y})`);
      g.appendChild(ellipse);

      // Stem: up for notes on/below middle line (B4 staffY≥107), down for above
      const stemUp = note.staffY >= 107;
      const stemX = stemUp ? x + RX - 1 : x - RX + 1;
      const stem = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      stem.setAttribute('x1', stemX);
      stem.setAttribute('y1', y);
      stem.setAttribute('x2', stemX);
      stem.setAttribute('y2', stemUp ? y - 65 : y + 65);
      stem.setAttribute('stroke', '#222');
      stem.setAttribute('stroke-width', '2');
      g.appendChild(stem);

      layer.appendChild(g);
    });
  }

  function showNewNotes() {
    count++;
    document.getElementById('counter').textContent = `第 ${count} 問`;
    const notes = pickRandomNotes(3);
    renderNotes(notes);
  }

  // Initial display
  renderNotes(pickRandomNotes(3));
</script>

</body>
</html>

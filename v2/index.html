<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>おんぷクイズ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fdf6e3;
      font-family: 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-tap-highlight-color: transparent;
    }

    h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: #5a3e1b;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: clamp(0.8rem, 3vw, 1rem);
      color: #9a7a4a;
      margin-bottom: 16px;
    }

    .level-selector {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .level-label {
      font-size: clamp(0.75rem, 2.5vw, 0.85rem);
      color: #9a7a4a;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .level-buttons {
      display: flex;
      gap: 8px;
    }

    .level-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #d4a870;
      background: white;
      color: #8a6030;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .level-btn:hover {
      background: #f5e8d0;
    }

    .level-btn.active {
      background: #c87a30;
      border-color: #c87a30;
      color: white;
      box-shadow: 0 2px 8px rgba(200,122,48,0.4);
    }

    .level-desc {
      font-size: clamp(0.7rem, 2.5vw, 0.82rem);
      color: #b08050;
    }

    .staff-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(90,62,27,0.15);
      padding: 40px 30px;
      width: 100%;
      max-width: 800px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.1s, box-shadow 0.1s;
      touch-action: manipulation;
    }

    .staff-container:active {
      transform: scale(0.98);
      box-shadow: 0 4px 16px rgba(90,62,27,0.15);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .note-group {
      transition: opacity 0.2s;
    }

    .note-enter {
      animation: popIn 0.3s ease-out forwards;
    }

    @keyframes popIn {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .tap-hint {
      margin-top: 20px;
      font-size: clamp(0.85rem, 3.5vw, 1.05rem);
      color: #b08050;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tap-icon {
      font-size: 1.4em;
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    .counter {
      margin-top: 12px;
      font-size: clamp(0.75rem, 2.5vw, 0.9rem);
      color: #c0a070;
    }

    .app-header {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @media (orientation: landscape) and (max-height: 520px) {
      body {
        flex-direction: row;
        align-items: center;
        justify-content: center;
        padding: 10px 16px;
        gap: 16px;
        min-height: 100vh;
      }

      .app-header {
        width: 110px;
        flex-shrink: 0;
        max-width: none;
      }

      h1 { font-size: 1rem; margin-bottom: 3px; }
      .subtitle { font-size: 0.72rem; margin-bottom: 6px; }
      .level-selector { gap: 4px; margin-bottom: 6px; }
      .level-buttons { gap: 5px; flex-wrap: wrap; width: 94px; }
      .level-btn { width: 28px; height: 28px; font-size: 0.76rem; }
      .level-desc { font-size: 0.64rem; }
      .tap-hint { margin-top: 8px; font-size: 0.78rem; gap: 5px; }
      .tap-icon { font-size: 1.1em; }
      .counter { margin-top: 4px; font-size: 0.7rem; }

      .staff-container {
        flex: 1;
        min-width: 0;
        max-width: none;
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>

<div class="app-header">
  <h1>🎵 おんぷクイズ</h1>
  <p class="subtitle">この音符は何の音？</p>

  <div class="level-selector">
    <span class="level-label">レベル</span>
    <div class="level-buttons">
      <button class="level-btn active" onclick="selectLevel(0)">1</button>
      <button class="level-btn" onclick="selectLevel(1)">2</button>
      <button class="level-btn" onclick="selectLevel(2)">3</button>
      <button class="level-btn" onclick="selectLevel(3)">4</button>
      <button class="level-btn" onclick="selectLevel(4)">5</button>
      <button class="level-btn" onclick="selectLevel(5)">6</button>
    </div>
    <span class="level-desc" id="levelDesc">ど・れ・み</span>
  </div>

  <p class="tap-hint"><span class="tap-icon">👆</span> タップで次の問題へ</p>
  <p class="counter" id="counter">第 1 問</p>
</div>

<div class="staff-container" id="staffCard" onclick="showNewNotes()">
  <svg id="staffSvg" viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg">
    <g id="staffLines" stroke="#444" stroke-width="1.5">
      <line x1="80" y1="80" x2="550" y2="80" />
      <line x1="80" y1="100" x2="550" y2="100" />
      <line x1="80" y1="120" x2="550" y2="120" />
      <line x1="80" y1="140" x2="550" y2="140" />
      <line x1="80" y1="160" x2="550" y2="160" />
    </g>

    <path fill="#333" transform="translate(82, 46) scale(3.7)"
      d="m12.049 3.5296c0.305 3.1263-2.019 5.6563-4.0772 7.7014-0.9349 0.897-0.155 0.148-0.6437 0.594-0.1022-0.479-0.2986-1.731-0.2802-2.11 0.1304-2.6939 2.3198-6.5875 4.2381-8.0236 0.309 0.5767 0.563 0.6231 0.763 1.8382zm0.651 16.142c-1.232-0.906-2.85-1.144-4.3336-0.885-0.1913-1.255-0.3827-2.51-0.574-3.764 2.3506-2.329 4.9066-5.0322 5.0406-8.5394 0.059-2.232-0.276-4.6714-1.678-6.4836-1.7004 0.12823-2.8995 2.156-3.8019 3.4165-1.4889 2.6705-1.1414 5.9169-0.57 8.7965-0.8094 0.952-1.9296 1.743-2.7274 2.734-2.3561 2.308-4.4085 5.43-4.0046 8.878 0.18332 3.334 2.5894 6.434 5.8702 7.227 1.2457 0.315 2.5639 0.346 3.8241 0.099 0.2199 2.25 1.0266 4.629 0.0925 6.813-0.7007 1.598-2.7875 3.004-4.3325 2.192-0.5994-0.316-0.1137-0.051-0.478-0.252 1.0698-0.257 1.9996-1.036 2.26-1.565 0.8378-1.464-0.3998-3.639-2.1554-3.358-2.262 0.046-3.1904 3.14-1.7356 4.685 1.3468 1.52 3.833 1.312 5.4301 0.318 1.8125-1.18 2.0395-3.544 1.8325-5.562-0.07-0.678-0.403-2.67-0.444-3.387 0.697-0.249 0.209-0.059 1.193-0.449 2.66-1.053 4.357-4.259 3.594-7.122-0.318-1.469-1.044-2.914-2.302-3.792zm0.561 5.757c0.214 1.991-1.053 4.321-3.079 4.96-0.136-0.795-0.172-1.011-0.2626-1.475-0.4822-2.46-0.744-4.987-1.116-7.481 1.6246-0.168 3.4576 0.543 4.0226 2.184 0.244 0.577 0.343 1.197 0.435 1.812zm-5.1486 5.196c-2.5441 0.141-4.9995-1.595-5.6343-4.081-0.749-2.153-0.5283-4.63 0.8207-6.504 1.1151-1.702 2.6065-3.105 4.0286-4.543 0.183 1.127 0.366 2.254 0.549 3.382-2.9906 0.782-5.0046 4.725-3.215 7.451 0.5324 0.764 1.9765 2.223 2.7655 1.634-1.102-0.683-2.0033-1.859-1.8095-3.227-0.0821-1.282 1.3699-2.911 2.6513-3.198 0.4384 2.869 0.9413 6.073 1.3797 8.943-0.5054 0.1-1.0211 0.143-1.536 0.143z"/>

    <g id="notesLayer"></g>
  </svg>
</div>

<script>
  const ALL_NOTES = {
    C4: { name: 'ド', staffY: 180, needsLedger: true },
    D4: { name: 'レ', staffY: 170, needsLedger: false },
    E4: { name: 'ミ', staffY: 160, needsLedger: false },
    F4: { name: 'ファ', staffY: 150, needsLedger: false },
    G4: { name: 'ソ', staffY: 140, needsLedger: false },
    A4: { name: 'ラ', staffY: 130, needsLedger: false },
    B4: { name: 'シ', staffY: 120, needsLedger: false },
    C5: { name: 'ド', staffY: 110, needsLedger: false },
  };

  const LEVELS = [
    { keys: ['C4', 'D4', 'E4'], desc: 'ど・れ・み' },
    { keys: ['C4', 'D4', 'E4', 'F4', 'G4'], desc: 'ど・れ・み・ふぁ・そ' },
    { keys: ['F4', 'G4', 'A4'], desc: 'ふぁ・そ・ら' },
    { keys: ['A4', 'B4', 'C5'], desc: 'ら・し・ど' },
    { keys: ['F4', 'G4', 'A4', 'C5'], desc: 'ふぁ・そ・ら・ど' },
    { keys: ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5'], desc: 'ど〜ど（全音）' },
  ];

  const NOTE_X = [230, 300, 370];
  const RX = 14;
  const RY = 11;

  let count = 1;
  let currentLevel = 0;

  function pickRandomNotes(n) {
    const pool = LEVELS[currentLevel].keys.map((key) => ALL_NOTES[key]);
    return Array.from({ length: n }, () => pool[Math.floor(Math.random() * pool.length)]);
  }

  function selectLevel(idx) {
    currentLevel = idx;
    document.querySelectorAll('.level-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === idx);
    });
    document.getElementById('levelDesc').textContent = LEVELS[idx].desc;
    count = 1;
    document.getElementById('counter').textContent = '第 1 問';
    renderNotes(pickRandomNotes(3));
  }

  function renderNotes(notes) {
    const layer = document.getElementById('notesLayer');
    layer.innerHTML = '';

    notes.forEach((note, i) => {
      const x = NOTE_X[i];
      const y = note.staffY;
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'note-enter');
      g.style.animationDelay = `${i * 80}ms`;
      g.setAttribute('transform-origin', `${x} ${y}`);

      if (note.needsLedger) {
        const ledger = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        ledger.setAttribute('x1', x - RX - 5);
        ledger.setAttribute('y1', y);
        ledger.setAttribute('x2', x + RX + 5);
        ledger.setAttribute('y2', y);
        ledger.setAttribute('stroke', '#222');
        ledger.setAttribute('stroke-width', '1.5');
        g.appendChild(ledger);
      }

      const ellipse = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
      ellipse.setAttribute('cx', x);
      ellipse.setAttribute('cy', y);
      ellipse.setAttribute('rx', RX);
      ellipse.setAttribute('ry', RY);
      ellipse.setAttribute('fill', '#222');
      ellipse.setAttribute('transform', `rotate(-15, ${x}, ${y})`);
      g.appendChild(ellipse);

      const stemUp = note.staffY >= 120;
      const stemX = stemUp ? x + RX - 1 : x - RX + 1;
      const stem = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      stem.setAttribute('x1', stemX);
      stem.setAttribute('y1', y);
      stem.setAttribute('x2', stemX);
      stem.setAttribute('y2', stemUp ? y - 55 : y + 55);
      stem.setAttribute('stroke', '#222');
      stem.setAttribute('stroke-width', '2');
      g.appendChild(stem);

      layer.appendChild(g);
    });
  }

  function showNewNotes() {
    count += 1;
    document.getElementById('counter').textContent = `第 ${count} 問`;
    renderNotes(pickRandomNotes(3));
  }

  renderNotes(pickRandomNotes(3));
</script>

</body>
</html>
